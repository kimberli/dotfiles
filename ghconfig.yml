# The current version of the config schema
version: 1
# What protocol to use when performing git operations. Supported values: ssh, https
git_protocol: https
# What editor gh should run when creating issues, pull requests, etc. If blank, will refer to environment.
editor:
# When to interactively prompt. This is a global config that cannot be overridden by hostname. Supported values: enabled, disabled
prompt: enabled
# Preference for editor-based interactive prompting. This is a global config that cannot be overridden by hostname. Supported values: enabled, disabled
prefer_editor_prompt: disabled
# A pager program to send command output to, e.g. "less". If blank, will refer to environment. Set the value to "cat" to disable the pager.
pager:
# Aliases allow you to create nicknames for gh commands
aliases:
    co: pr checkout
    aipr: "!f() {\n  issue_prefix=\"\";\n  case \"$1\" in\n    [A-Z]*-[0-9]*) issue_prefix=\"$1\"; shift; echo \"  Issue: [$issue_prefix]\";;\n  esac;\n  intent=\"$*\";\n  branch=$(git branch --show-current);\n  base=$(gh repo view --json defaultBranchRef --jq .defaultBranchRef.name);\n  echo \"\U0001F50D Comparing branch \\\"$branch\\\" against \\\"$base\\\"...\";\n  repo_root=$(git rev-parse --show-toplevel);\n  diff_content=$(git diff -U1 origin/$base...HEAD -- \"$repo_root\" \":(exclude)*lock*\" | head -c 24000);\n  if [ -z \"$diff_content\" ]; then\n    echo \"❌ Error: The diff is empty! Make sure you have committed your changes.\";\n    return 1;\n  fi;\n  context=\"Context:\\n- Branch name: $branch\\n\";\n  if [ -n \"$intent\" ]; then\n    context=\"${context}- Developer intent: $intent\\n\";\n    echo \"\U0001F9E0 Using intent: $intent\";\n  fi;\n  \n  # Export payload and prompt variables for safe JSON generation using jq\n  export payload=$(printf \"%b\\nDiff:\\n%s\" \"$context\" \"$diff_content\");\n  export prompt=\"You are a PR metadata generator. Write a concise, factual PR title and a brief PR description for this diff. Output your answer STRICTLY as a raw JSON object with keys \\\"title\\\" and \\\"body\\\". The \\\"body\\\" must be standard markdown: it must start with a summary sentence explaining why this change was made, followed by a double newline (\\n\\n), and then a bulleted list of technical changes using standard markdown hyphens (- ). Ensure there is a newline character (\\n) before every bullet item so they render as a list in GitHub. Use sentence case. Do not wrap the JSON in markdown code blocks.\";\n\n  tmp_payload=\"/tmp/aipr_payload_$$.json\"\n  tmp_response=\"/tmp/aipr_response_$$.json\"\n\n  # Build JSON payload securely\n  jq -n --arg model \"gpt-4o-mini\" '{model: $model, messages: [{role: \"user\", content: (env.payload + \"\\n\\nPrompt: \" + env.prompt)}]}' > \"$tmp_payload\"\n\n  echo \"\U0001F916 Generating PR metadata (single-shot)...\";\n  # Make direct, authenticated API call to OpenAI-compatible endpoint\n  curl -s -L \\\n    -X POST \\\n    -H \"Authorization: Bearer $(gh auth token)\" \\\n    -H \"Content-Type: application/json\" \\\n    https://models.github.ai/inference/chat/completions \\\n    -d @\"$tmp_payload\" > \"$tmp_response\"\n\n  # Parse nested JSON fields directly from the original valid API response\n  title=$(cat \"$tmp_response\" | jq -r '.choices[0].message.content | fromjson | .title' 2>/dev/null)\n  body=$(cat \"$tmp_response\" | jq -r '.choices[0].message.content | fromjson | .body' 2>/dev/null)\n\n  # Clean up temp files\n  rm -f \"$tmp_payload\" \"$tmp_response\"\n\n  # Check if title is empty or null\n  if [ -z \"$title\" ] || [ \"$title\" = \"null\" ]; then\n    echo \"❌ Error: AI returned an empty title. PR creation aborted.\";\n    return 1;\n  fi;\n\n  # Check if body is empty or null\n  if [ -z \"$body\" ] || [ \"$body\" = \"null\" ]; then\n    echo \"❌ Error: AI returned an empty description. PR creation aborted.\";\n    return 1;\n  fi;\n\n  if [ -n \"$issue_prefix\" ]; then\n    title=\"[$issue_prefix] $title\";\n  fi;\n  echo \"\U0001F680 Opening Pull Request...\";\n  gh pr create --title \"$title\" --body \"$body\";\n}; f \"$@\""
# The path to a unix socket through which to send HTTP connections. If blank, HTTP traffic will be handled by net/http.DefaultTransport.
http_unix_socket:
# What web browser gh should use when opening URLs. If blank, will refer to environment.
browser:
# Whether to display labels using their RGB hex color codes in terminals that support truecolor. Supported values: enabled, disabled
color_labels: disabled
# Whether customizable, 4-bit accessible colors should be used. Supported values: enabled, disabled
accessible_colors: disabled
# Whether an accessible prompter should be used. Supported values: enabled, disabled
accessible_prompter: disabled
# Whether to use a animated spinner as a progress indicator. If disabled, a textual progress indicator is used instead. Supported values: enabled, disabled
spinner: enabled
