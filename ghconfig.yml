# The current version of the config schema
version: 1
# What protocol to use when performing git operations. Supported values: ssh, https
git_protocol: https
# What editor gh should run when creating issues, pull requests, etc. If blank, will refer to environment.
editor:
# When to interactively prompt. This is a global config that cannot be overridden by hostname. Supported values: enabled, disabled
prompt: enabled
# Preference for editor-based interactive prompting. This is a global config that cannot be overridden by hostname. Supported values: enabled, disabled
prefer_editor_prompt: disabled
# A pager program to send command output to, e.g. "less". If blank, will refer to environment. Set the value to "cat" to disable the pager.
pager:
# Aliases allow you to create nicknames for gh commands
aliases:
    co: pr checkout
    aipr: "!f() { \\\n  intent=\"$*\"; \\\n  branch=$(git branch --show-current); \\\n  base=$(gh repo view --json defaultBranchRef --jq .defaultBranchRef.name); \\\n  echo \"\U0001F50D Comparing branch \\\"$branch\\\" against \\\"$base\\\"...\"; \\\n  diff_content=$(git diff -U1 origin/$base...HEAD -- . \":(exclude)*lock*\" | head -c 24000); \\\n  if [ -z \"$diff_content\" ]; then \\\n    echo \"❌ Error: The diff is empty! Make sure you have committed your changes.\"; \\\n    return 1; \\\n  fi; \\\n  context=\"Context:\\n- Branch name: $branch\\n\"; \\\n  if [ -n \"$intent\" ]; then \\\n    context=\"${context}- Developer intent: $intent\\n\"; \\\n    echo \"\U0001F9E0 Using intent: $intent\"; \\\n  fi; \\\n  payload=$(printf \"%b\\nDiff:\\n%s\" \"$context\" \"$diff_content\"); \\\n  echo \"\U0001F916 Generating title...\"; \\\n  title=$(echo \"$payload\" | gh models run openai/gpt-4o \"Write a concise, factual PR title for this diff. Use the provided context (branch name and intent) to inform the title. Use sentence case. Do not use quotes.\"); \\\n  echo \"\U0001F916 Generating description...\"; \\\n  body=$(echo \"$payload\" | gh models run openai/gpt-4o \"Write a PR description. First, write a single summary sentence explaining WHY this change is being made (relying heavily on the provided branch name and intent). Then, provide a bulleted list of the technical changes. Keep it brief, factual, and use sentence case.\"); \\\n  if [ -z \"$body\" ]; then \\\n    echo \"⚠️ Warning: AI returned an empty description. Using a fallback.\"; \\\n    body=\"* Automated PR generated from diff.\"; \\\n  fi; \\\n  echo \"\U0001F680 Opening Pull Request...\"; \\\n  gh pr create --title \"$title\" --body \"$body\"; \\\n}; f"
# The path to a unix socket through which to send HTTP connections. If blank, HTTP traffic will be handled by net/http.DefaultTransport.
http_unix_socket:
# What web browser gh should use when opening URLs. If blank, will refer to environment.
browser:
# Whether to display labels using their RGB hex color codes in terminals that support truecolor. Supported values: enabled, disabled
color_labels: disabled
# Whether customizable, 4-bit accessible colors should be used. Supported values: enabled, disabled
accessible_colors: disabled
# Whether an accessible prompter should be used. Supported values: enabled, disabled
accessible_prompter: disabled
# Whether to use a animated spinner as a progress indicator. If disabled, a textual progress indicator is used instead. Supported values: enabled, disabled
spinner: enabled
